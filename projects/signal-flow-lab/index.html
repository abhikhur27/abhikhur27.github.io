<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Flow Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="container header">
    <a class="back-link" href="../../index.html">Back to Portfolio</a>
    <h1>Signal Flow Lab</h1>
    <p>Experiment with feedback and damping in directed node networks.</p>
  </header>

  <main class="container layout">
    <section class="panel controls">
      <h2>Simulation Controls</h2>

      <label>
        Nodes
        <input id="node-count" type="range" min="6" max="16" step="1" value="10">
      </label>
      <p class="mono" id="node-count-label">10 nodes</p>

      <label>
        Damping
        <input id="damping" type="range" min="0.65" max="0.98" step="0.01" value="0.86">
      </label>
      <p class="mono" id="damping-label">0.86</p>

      <label>
        Activation Threshold
        <input id="threshold" type="range" min="0.15" max="1.1" step="0.05" value="0.45">
      </label>
      <p class="mono" id="threshold-label">0.45</p>

      <div class="button-row">
        <button id="randomize-graph" type="button">Randomize Graph</button>
        <button id="inject-pulse" class="primary" type="button">Inject Pulse</button>
        <button id="toggle-run" type="button">Pause</button>
      </div>

      <h3>Live Metrics</h3>
      <div class="metrics">
        <article><h4>Active Nodes</h4><p id="metric-active">0</p></article>
        <article><h4>Peak Signal</h4><p id="metric-peak">0.00</p></article>
        <article><h4>Energy</h4><p id="metric-energy">0.00</p></article>
      </div>
      <p id="status" class="status">Running continuous propagation.</p>
    </section>

    <section class="panel visual">
      <h2>Network Canvas</h2>
      <svg id="network" class="network" viewBox="0 0 940 560" aria-label="Signal propagation graph"></svg>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
